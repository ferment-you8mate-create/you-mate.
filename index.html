<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>発酵ごはん レシピ帳</title>
    <link rel="stylesheet" href="styles.css">
  </head>
  <body>
    <header class="hero">
      <img class="hero__image" src="assets/hero-fermented-recipe-book.png" alt="発酵料理のレシピ帳">
      <div class="hero__shade"></div>
      <nav class="nav" aria-label="サイト内ナビゲーション">
        <a href="#recipes">レシピ</a>
        <a href="#collection">分類</a>
      </nav>
      <div class="hero__content">
        <p class="eyebrow">大切な人に贈りたい</p>
        <h1>発酵ごはん<br>レシピ帳</h1>
        <p class="lead">生徒さんから届いた、麹と発酵を暮らしに取り入れるためのやさしいレシピ集。</p>
      </div>
    </header>

    <main>
      <section class="intro" id="collection">
        <div>
          <p class="section-kicker">Recipe Collection</p>
          <h2>麹調味料から広がる、日々の食卓</h2>
        </div>
        <dl class="stats" aria-label="レシピ概要">
          <div>
            <dt id="recipeCount">12</dt>
            <dd>Recipes</dd>
          </div>
          <div>
            <dt id="studentCount">12</dt>
            <dd>Students</dd>
          </div>
          <div>
            <dt>Koji</dt>
            <dd>Fermented</dd>
          </div>
        </dl>
      </section>

      <section class="toolbar" aria-label="レシピ絞り込み">
        <div class="search">
          <span aria-hidden="true">⌕</span>
          <input id="searchInput" type="search" placeholder="料理名・名前・麹・ラベルで検索" autocomplete="off">
        </div>
        <div class="filter-stack">
          <div class="filter-row" role="list" aria-label="カテゴリ">
            <span class="filter-label">分類</span>
            <button class="filter is-active" type="button" data-filter="all">すべて</button>
            <button class="filter" type="button" data-filter="main">主菜</button>
            <button class="filter" type="button" data-filter="side">副菜</button>
            <button class="filter" type="button" data-filter="sweets">甘味</button>
            <button class="filter" type="button" data-filter="drink">飲み物</button>
          </div>
          <div class="filter-row" role="list" aria-label="ラベル">
            <span class="filter-label">ラベル</span>
            <button class="label-filter is-active" type="button" data-label="all">すべて</button>
            <button class="label-filter" type="button" data-label="肉">肉</button>
            <button class="label-filter" type="button" data-label="魚">魚</button>
            <button class="label-filter" type="button" data-label="野菜">野菜</button>
            <button class="label-filter" type="button" data-label="前菜">前菜</button>
            <button class="label-filter" type="button" data-label="サラダ">サラダ</button>
            <button class="label-filter" type="button" data-label="デザート">デザート</button>
            <button class="label-filter" type="button" data-label="飲み物">飲み物</button>
          </div>
        </div>
      </section>

      <section class="recipes" id="recipes" aria-live="polite"></section>
    </main>

    <dialog class="modal" id="recipeModal">
      <button class="modal__close" type="button" aria-label="閉じる">×</button>
      <article id="modalContent"></article>
    </dialog>

    <script src="recipes.js"></script>
    <script src="app.js"></script>
  </body>
</html>
